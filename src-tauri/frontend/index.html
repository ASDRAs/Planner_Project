<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Planner Floating</title>
    <style>
      :root {
        color-scheme: dark;
        background: #050507;
        color: #d8d3ff;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        align-items: center;
        display: flex;
        height: 100vh;
        justify-content: center;
        margin: 0;
      }

      main {
        letter-spacing: 0.18em;
        text-align: center;
        text-transform: uppercase;
      }

      h1 {
        font-size: 0.8rem;
        margin: 0;
      }

      p {
        color: #7bf1a8;
        font-size: 0.65rem;
        font-weight: 700;
        margin: 0.75rem 0 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Planner Floating</h1>
      <p>Loading remote archive</p>
    </main>
  </body>
</html>
